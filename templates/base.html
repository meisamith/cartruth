<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CarTruth">
  <meta name="description" content="India's honest car guide. Real mileage, real ownership cost, real problems.">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <title>{% block title %}CarTruth{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      animation: fadeIn 0.25s ease;
      opacity: 1;
    }

    h1, h2, h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000000; }
    ::-webkit-scrollbar-thumb { background: #333333; border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: #e94560; }

    /* ── Navbar ─────────────────────────────────────── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 40px;
      height: 64px;
      background: #000000;
      border-bottom: 1px solid #222222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo-link {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo {
      height: 44px;
      width: auto;
      object-fit: contain;
    }

    .nav-tagline {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.3px;
    }

    /* ── Page wrapper ───────────────────────────────── */
    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-logo-link">
      <img src="/static/icons/logo.png" alt="CarTruth" class="nav-logo">
    </a>
    <div class="nav-right">
      <span class="nav-tagline">India's honest car guide</span>
    </div>
  </nav>

  <div class="page">
    {% block content %}{% endblock %}
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }

    // Page-out fade on internal link clicks
    document.addEventListener('click', e => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (href && href.startsWith('/') && !href.startsWith('//')) {
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.15s ease';
      }
    });
  </script>
  {% block extra_scripts %}{% endblock %}

</body>
</html>
