<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CarTruth">
  <meta name="description" content="India's honest car guide. Real mileage, real ownership cost, real problems.">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <title>{% block title %}CarTruth{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1, h2, h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000000; }
    ::-webkit-scrollbar-thumb { background: #333333; border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: #e94560; }

    /* ── Navbar ─────────────────────────────────────── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      background: #000000;
      border-bottom: 1px solid #222222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo-link {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .nav-logo {
      height: 44px;
      width: auto;
      object-fit: contain;
    }

    .nav-tagline {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.3px;
    }

    /* ── Page wrapper ───────────────────────────────── */
    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
    }

    {% block extra_styles %}{% endblock %}

    /* ── Noise overlay ──────────────────────────────── */
    .noise-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='1'/></svg>");
      background-repeat: repeat;
    }

    /* ── Custom cursor ──────────────────────────────── */
    @media (pointer: fine) {
      body { cursor: none; }
      * { cursor: none !important; }
    }

    /* ── Loading screen ─────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(0.97); }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <!-- Custom Cursor (desktop only) -->
  <div id="cursor" style="width:12px;height:12px;background:#e94560;border-radius:50%;position:fixed;pointer-events:none;z-index:99999;mix-blend-mode:difference;left:0;top:0;"></div>
  <div id="cursor-follower" style="width:36px;height:36px;border:1px solid rgba(233,69,96,0.5);border-radius:50%;position:fixed;pointer-events:none;z-index:99998;left:0;top:0;"></div>

  <!-- Loading Screen -->
  <div id="loader" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#000000;z-index:100000;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <img src="/static/icons/logo.png" style="width:120px;height:auto;animation:pulse 1s ease infinite;" alt="CarTruth">
    <div style="width:200px;height:2px;background:#111111;border-radius:100px;margin-top:32px;overflow:hidden;">
      <div id="loader-bar" style="height:100%;width:0%;background:#e94560;border-radius:100px;transition:width 1.2s ease;"></div>
    </div>
  </div>

  <!-- Noise Texture Overlay -->
  <div class="noise-overlay"></div>

  <nav class="navbar">
    <a href="/" class="nav-logo-link">
      <img src="/static/icons/logo.png" alt="CarTruth" class="nav-logo">
    </a>
    <div class="nav-right">
      <span class="nav-tagline">India's honest car guide</span>
    </div>
  </nav>

  <div class="page">
    {% block content %}{% endblock %}
  </div>

  <script>
    // ── Service Worker ─────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }

    // ── Loading Screen ─────────────────────────────────────────────────────────
    window.addEventListener('load', () => {
      const loaderBar = document.getElementById('loader-bar');
      if (loaderBar) loaderBar.style.width = '100%';
      setTimeout(() => {
        gsap.to('#loader', { opacity: 0, duration: 0.5, onComplete: () => {
          const loader = document.getElementById('loader');
          if (loader) loader.style.display = 'none';
        }});
      }, 1500);
    });

    // ── Desktop-only enhancements ──────────────────────────────────────────────
    const _isMobile = window.innerWidth < 768;

    if (!_isMobile) {
      // Page entrance animation
      gsap.from('body', { opacity: 0, y: 20, duration: 0.4, ease: 'power2.out', delay: 0.05 });

      // Custom cursor movement
      document.addEventListener('mousemove', e => {
        gsap.to('#cursor',          { x: e.clientX - 6,  y: e.clientY - 6,  duration: 0.1 });
        gsap.to('#cursor-follower', { x: e.clientX - 18, y: e.clientY - 18, duration: 0.3 });
      });

      // Cursor scale on interactive elements
      function bindCursorHover() {
        document.querySelectorAll('button, a, input, .chip').forEach(el => {
          el.addEventListener('mouseenter', () => {
            gsap.to('#cursor',          { scale: 2.5, duration: 0.3 });
            gsap.to('#cursor-follower', { scale: 1.5, opacity: 0, duration: 0.3 });
          });
          el.addEventListener('mouseleave', () => {
            gsap.to('#cursor',          { scale: 1, duration: 0.3 });
            gsap.to('#cursor-follower', { scale: 1, opacity: 1, duration: 0.3 });
          });
        });
      }
      bindCursorHover();

      // Page exit transition
      document.addEventListener('click', e => {
        const link = e.target.closest('a[href]');
        if (!link) return;
        const href = link.getAttribute('href');
        if (href && href.startsWith('/') && !href.startsWith('//')) {
          e.preventDefault();
          gsap.to('body', { opacity: 0, y: -20, duration: 0.3, onComplete: () => {
            window.location.href = href;
          }});
        }
      });

    } else {
      // Mobile page-out fallback
      document.addEventListener('click', e => {
        const link = e.target.closest('a[href]');
        if (!link) return;
        const href = link.getAttribute('href');
        if (href && href.startsWith('/') && !href.startsWith('//')) {
          document.body.style.opacity = '0';
          document.body.style.transition = 'opacity 0.15s ease';
        }
      });
    }
  </script>
  {% block extra_scripts %}{% endblock %}

</body>
</html>
